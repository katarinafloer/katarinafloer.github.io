<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kate Flöer</title>
    <meta
      name="description"
      content="Kate Flöer's personal website, reading list, links, and repositories."
    >
    <script>
      const stylesheet = document.createElement("link");
      stylesheet.rel = "stylesheet";
      stylesheet.href = `styles.css?v=${Date.now()}`;
      document.head.append(stylesheet);
    </script>
  </head>
  <body>
    <header class="site-header">
      <nav class="nav" aria-label="Main navigation">
        <a class="brand" href="./" aria-label="Kate Flöer home">Kate Flöer</a>
        <div class="nav-links">
          <a class="nav-link active" href="./" aria-current="page">Kate's List</a>
          <a class="nav-link" href="https://github.com/katarinafloer">My Repositories</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="intro" aria-labelledby="page-title">
        <p class="eyebrow">Personal notes and links</p>
        <h1 id="page-title">Kate's List</h1>
        <p class="lede">
          A living place for things I am reading, saving, and thinking about.
        </p>
      </section>

      <section class="list-section" aria-label="Saved links">
        <aside class="list-menu" aria-labelledby="list-menu-title">
          <h2 id="list-menu-title">On This Page</h2>
          <nav aria-label="Kate's List sections">
            <ul id="section-menu" class="section-menu"></ul>
          </nav>
        </aside>

        <div class="list-content">
          <div class="section-heading">
            <h2>Saved Things</h2>
            <p>Reading, references, and useful corners of the internet.</p>
          </div>
          <div id="reading-list" class="reading-list"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span>Kate Flöer</span>
      <span id="last-updated" class="last-updated"></span>
      <a href="https://github.com/katarinafloer">GitHub</a>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
